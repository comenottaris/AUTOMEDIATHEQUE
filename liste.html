<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Automédiathèque</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="assets/automediatheque.css" />

    <!-- Balises Open Graph -->
    <meta property="og:title" content="Automédiathèque">
    <meta property="og:description" content="Liste open-source d'automédias en lutte — filtrez par type, pays, langue">
    <meta property="og:url" content="https://automediatheque.org/liste.html">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://automediatheque.org/assets/preview-image.jpg">
    <meta property="og:image:width" content="667">
    <meta property="og:image:height" content="130">
    <meta property="og:image:alt" content="Prévisualisation d'Automédiathèque">

    <!-- SEO -->
    <meta name="description" content="Liste open-source d'automédias en lutte. Filtrez par type, pays ou langue. Base collaborative de médias autonomes et indépendants.">
    <meta name="keywords" content="automédias, automedia, luttes sociales, activisme, militantisme, autonomie, indymedia, médias alternatifs, médiactivisme, médias tactiques, autoproduction, autod[...]

    <!-- Security -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <style>
      /* ═══════════════════════════════
         VIEW TOGGLE
         ═══════════════════════════════ */
      .am-view-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .am-count-text {
        font-size: 0.82rem;
        color: var(--am-text-soft);
        margin: 0;
      }
      .am-count-text strong { color: var(--am-text); }

      .am-view-toggle {
        display: flex;
        gap: 0.25rem;
        background: var(--am-surface);
        border: 1px solid var(--am-border-subtle);
        border-radius: 10px;
        padding: 3px;
      }
      .am-view-btn {
        padding: 0.3rem 0.65rem;
        border: none;
        background: transparent;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.82rem;
        color: var(--am-text-soft);
        transition: all 0.15s ease;
      }
      .am-view-btn.active {
        background: var(--am-accent);
        color: #fff;
      }
      .am-view-btn:hover:not(.active) {
        background: var(--am-accent-soft);
      }

      /* ═══════════════════════════════
         LIST VIEW — LOGO SQUARE
         ═══════════════════════════════ */
      .am-list-logo {
        width: 48px;
        height: 48px;
        min-width: 48px;
        border-radius: 10px;
        object-fit: cover;
        background: var(--am-surface);
        border: 1px solid var(--am-border-subtle);
        display: block;
      }
      .am-list-logo-fallback {
        width: 48px;
        height: 48px;
        min-width: 48px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.25rem;
        font-weight: 700;
        color: #fff;
        flex-shrink: 0;
      }
      /* ═══════════════════════════════
         EMPTY STATE
         ═══════════════════════════════ */
      .am-empty {
        text-align: center;
        padding: 3rem 1rem;
        color: var(--am-text-softer);
        display: none;
      }
      .am-empty-icon { font-size: 2rem; margin-bottom: 0.5rem; }

      /* ═══════════════════════════════
         ACCESSIBILITY
         ═══════════════════════════════ */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          transition-duration: 0.01ms !important;
          animation-duration: 0.01ms !important;
        }
      }
      .am-skip-link {
        position: absolute;
        top: -100px; left: 0;
        background: var(--am-accent);
        color: #fff;
        padding: 0.5rem 1rem;
        z-index: 99999;
        font-size: 0.9rem;
        text-decoration: none;
        border-radius: 0 0 8px 0;
      }
      .am-skip-link:focus { top: 0; }

      /* ═══════════════════════════════
         RESPONSIVE
         ═══════════════════════════════ */
      @media (max-width: 640px) {
        .am-detail-panel { padding: 1.5rem 1.2rem; }
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="am-skip-link">Aller au contenu principal</a>

    <!-- Curseur personnalisé -->
    <div id="custom-cursor"></div>

    <!-- Menu de navigation -->
    <nav class="am-nav">
      <button class="am-menu-btn" id="menu-toggle" aria-expanded="false" aria-label="Menu">
        <span class="am-menu-icon">☰</span>
      </button>
      <div class="am-nav-dropdown" id="menu-dropdown">
        <a href="index.html" class="am-nav-link">
          <span data-fr>Accueil</span><span data-en hidden>Home</span>
        </a>
        <a href="apropos.html" class="am-nav-link">
          <span data-fr>À propos</span><span data-en hidden>About</span>
        </a>
        <a href="liste.html" class="am-nav-link active">
          <span data-fr>Automédiathèque</span><span data-en hidden>Automédiathèque</span>
        </a>
        <div class="am-nav-separator"></div>
        <a href="formulaire.html" class="am-nav-link">
          <span data-fr>Participer</span><span data-en hidden>Contribute</span>
        </a>
        <a href="ressources.html" class="am-nav-link">
          <span data-fr>Ressources</span><span data-en hidden>Resources</span>
        </a>
      </div>
    </nav>

    <!-- Language toggle -->
    <button class="am-lang-toggle" id="lang-toggle" aria-label="Switch language">EN</button>

    <!-- VIEW BAR: count + view toggle -->
    <div class="am-view-bar">
      <p class="am-count-text" id="am-count" aria-live="polite"></p>
      <div class="am-view-toggle" role="tablist" aria-label="Mode d'affichage">
        <button class="am-view-btn" data-view="grid" role="tab" aria-selected="false">
          <span data-fr>⊞ Grille</span><span data-en hidden>⊞ Grid</span>
        </button>
        <!-- LIST is now default/active -->
        <button class="am-view-btn active" data-view="list" role="tab" aria-selected="true">
          <span data-fr>☰ Liste</span><span data-en hidden>☰ List</span>
        </button>
        <button class="am-view-btn" data-view="bubble" role="tab" aria-selected="false">
          <span data-fr>◉ Bulles</span><span data-en hidden>◉ Bubbles</span>
        </button>
      </div>
    </div>

    <!-- RESULTS -->
    <section class="am-results-section">
      <!-- GRID VIEW -->
      <div id="am-grid-view"></div>
      <!-- LIST VIEW -->
      <div class="am-list-view" id="am-list-view"></div>
      <!-- BUBBLE VIEW -->
      <div class="am-bubble-wrap" id="am-bubble-view">
        <div class="am-bubble-tooltip" id="bubble-tooltip">
          <div class="am-bubble-tooltip-name"></div>
          <div class="am-bubble-tooltip-type"></div>
          <div class="am-bubble-tooltip-desc"></div>
        </div>
      </div>
      <!-- EMPTY -->
      <div class="am-empty" id="am-empty">
        <div class="am-empty-icon">∅</div>
        <p><span data-fr>Aucun automédia ne correspond à votre recherche.</span><span data-en hidden>No automedia matches your search.</span></p>
      </div>
    </section>

    <!-- DETAIL OVERLAY -->
    <div class="am-detail-overlay" id="detail-overlay" role="dialog" aria-modal="true" aria-label="Détail de l'automédia">
      <div class="am-detail-panel" id="detail-panel">
        <button class="am-detail-close" id="detail-close" aria-label="Fermer">✕</button>
        <h2 class="am-detail-name" id="detail-name"></h2>
        <p class="am-detail-desc" id="detail-desc"></p>
        <div class="am-detail-meta" id="detail-meta"></div>
        <a class="am-detail-link" id="detail-link" href="#" target="_blank" rel="noopener">
          <span data-fr>Visiter ↗</span><span data-en hidden>Visit ↗</span>
        </a>
      </div>
    </div>

    <!-- D3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <!-- Load existing automediatheque.js for data fetching -->
    <script src="assets/automediatheque.js"></script>

    <script>
    // ═══════════════════════════════════════
    // ENHANCED INTERACTIVE LAYER
    // Hooks into automediatheque.js data pipeline
    // ═══════════════════════════════════════

    (function() {
      'use strict';

      // ── STATE ──
      // DEFAULT VIEW: list (was grid)
      let currentView = 'list';
      let searchQuery = '';
      let activeLang = null;
      let allData = [];

      // ── LOGO SLUG HELPER ──
      // Converts an automédia name to its logo filename slug
      // e.g. "Paris Luttes Info" → "paris-luttes-info"
      function nameToSlug(name) {
        if (!name) return '';
        return name
          .toLowerCase()
          .normalize('NFD')                        // decompose accents
          .replace(/[\u0300-\u036f]/g, '')         // strip accent marks
          .replace(/[^a-z0-9\s-]/g, '')            // remove non-alphanumeric
          .trim()
          .replace(/\s+/g, '-')                    // spaces → hyphens
          .replace(/-+/g, '-');                    // collapse multiple hyphens
      }

      // Returns the logo URL for an item, trying PNG then SVG
      // If item has an explicit logo field, use it first
      function getLogoUrl(item) {
        const slug = item.logo_slug || nameToSlug(item.name);
        if (!slug) return null;
        return 'assets/logos/' + slug + '.png';
      }

      function getLogoSvgUrl(item) {
        const slug = item.logo_slug || nameToSlug(item.name);
        if (!slug) return null;
        return 'assets/logos/' + slug + '.svg';
      }

      // ── COUNTRY COLORS (kept from original) ──
      const COUNTRY_COLORS = {
        'France':      { fill: 'rgba(0,35,149,0.18)',  stroke: 'rgba(0,35,149,0.55)'  },
        'USA':         { fill: 'rgba(178,34,34,0.18)', stroke: 'rgba(178,34,34,0.55)' },
        'Brésil':      { fill: 'rgba(0,130,60,0.18)',  stroke: 'rgba(0,130,60,0.55)'  },
        'Kurdistan':   { fill: 'rgba(255,165,0,0.20)', stroke: 'rgba(200,120,0,0.6)'  },
        'International':{ fill:'rgba(80,80,80,0.13)',  stroke: 'rgba(80,80,80,0.45)'  },
        'Mexique':     { fill: 'rgba(0,104,71,0.18)',  stroke: 'rgba(0,104,71,0.55)'  },
        'UK':          { fill: 'rgba(0,36,125,0.15)',  stroke: 'rgba(0,36,125,0.5)'   },
        'Allemagne':   { fill: 'rgba(30,30,30,0.15)',  stroke: 'rgba(30,30,30,0.5)'   },
      };
      const DEFAULT_COLOR = { fill: 'rgba(120,80,200,0.15)', stroke: 'rgba(120,80,200,0.5)' };
      function getCountryColor(c) { return COUNTRY_COLORS[c] || DEFAULT_COLOR; }

      // ── HELPERS ──
      function langLabel(code) {
        const map = { 'fr':'FR', 'en':'EN', 'es':'ES', 'pt-BR':'PT-BR', 'de':'DE', 'ar':'AR', 'ku':'KU' };
        return map[code] || code.toUpperCase();
      }

      function shortName(name, maxLen) {
        if (!name) return '';
        if (name.length <= maxLen) return name;
        return '';
      }

      function matchesSearch(item) {
        if (!searchQuery) return true;
        const q = searchQuery.toLowerCase();
        return (item.name || '').toLowerCase().includes(q) ||
               (item.description || '').toLowerCase().includes(q) ||
               (item.country || '').toLowerCase().includes(q) ||
               (item.type || '').toLowerCase().includes(q);
      }

      function matchesLang(item) {
        if (!activeLang) return true;
        return Array.isArray(item.languages) && item.languages.includes(activeLang);
      }

      function getFiltered() {
        const typeVal    = document.getElementById('am-filter-type')?.value    || '';
        const countryVal = document.getElementById('am-filter-country')?.value || '';
        const originVal  = document.getElementById('am-filter-origin')?.value  || '';

        return allData.filter(item => {
          if (typeVal    && item.type    !== typeVal)    return false;
          if (countryVal && item.country !== countryVal) return false;
          if (originVal  && item.__origin !== originVal) return false;
          if (!matchesSearch(item)) return false;
          if (!matchesLang(item))   return false;
          return true;
        });
      }

      // ── LANG FILTERS ──
      function buildLangFilters() {
        const container = document.getElementById('am-lang-filter');
        if (!container) return;
        container.innerHTML = '';

        const allLangs = new Set();
        allData.forEach(item => {
          if (Array.isArray(item.languages)) item.languages.forEach(l => allLangs.add(l));
        });

        [...allLangs].sort().forEach(lang => {
          const btn = document.createElement('button');
          btn.className = 'am-lang-pill';
          btn.dataset.lang = lang;
          btn.textContent = langLabel(lang);
          btn.setAttribute('aria-pressed', 'false');
          btn.addEventListener('click', () => {
            activeLang = (activeLang === lang) ? null : lang;
            render();
          });
          container.appendChild(btn);
        });

        const clear = document.createElement('button');
        clear.className = 'am-lang-clear';
        clear.textContent = '✕';
        clear.title = 'Effacer le filtre langue';
        clear.style.display = 'none';
        clear.id = 'am-lang-clear';
        clear.addEventListener('click', () => { activeLang = null; render(); });
        container.appendChild(clear);
      }

      function updateLangUI() {
        document.querySelectorAll('.am-lang-pill').forEach(btn => {
          const isActive = btn.dataset.lang === activeLang;
          btn.classList.toggle('active', isActive);
          btn.setAttribute('aria-pressed', isActive);
        });
        const clear = document.getElementById('am-lang-clear');
        if (clear) clear.style.display = activeLang ? '' : 'none';
      }

      // ── RENDER ──
      function render() {
        const filtered = getFiltered();
        updateLangUI();
        updateCount(filtered.length);

        if      (currentView === 'grid')   renderGrid(filtered);
        else if (currentView === 'list')   renderList(filtered);
        else if (currentView === 'bubble') renderBubbles(filtered);

        document.getElementById('am-empty').style.display = filtered.length === 0 ? '' : 'none';
      }

      function updateCount(n) {
        const el = document.getElementById('am-count');
        if (el) el.innerHTML = `<strong>${n}</strong> automédia${n > 1 ? 's' : ''}`;
      }

      // ── GRID VIEW (grouped by country) ──
      function renderGrid(items) {
        const container = document.getElementById('am-grid-view');
        container.style.display = currentView === 'grid' ? '' : 'none';
        document.getElementById('am-list-view').classList.remove('active');
        document.getElementById('am-bubble-view').classList.remove('active');
        if (currentView !== 'grid') return;

        const groups = {};
        items.forEach(item => {
          const key = item.country || 'Autre';
          if (!groups[key]) groups[key] = [];
          groups[key].push(item);
        });

        let html = '';
        Object.keys(groups).sort().forEach(groupName => {
          const groupItems = groups[groupName];
          html += `<div class="am-group">
            <div class="am-group-header">
              <span class="am-group-label">${groupName}</span>
              <span class="am-group-count">${groupItems.length}</span>
            </div>
            <div class="am-grid">`;
          groupItems.forEach(item => { html += buildCard(item); });
          html += `</div></div>`;
        });

        container.innerHTML = html;
        container.querySelectorAll('.am-card').forEach(card => {
          card.addEventListener('click', () => openDetail(card.dataset.name));
          card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openDetail(card.dataset.name); });
        });
      }

      // ── CARD BUILDER (grid) ──
      function buildCard(item) {
        const logoUrl = getLogoUrl(item);
        const logoSvgUrl = getLogoSvgUrl(item);
        const slug    = nameToSlug(item.name);
        const color   = getCountryColor(item.country);

        // Visual: try logo image, fallback to letter avatar
        const visualHTML = `
          <div class="am-card-visual" style="position:relative;width:40px;height:40px;border-radius:8px;overflow:hidden;flex-shrink:0;">
            <img
              src="${logoUrl}"
              alt="${(item.name || '').replace(/"/g, '&quot;')} logo"
              style="width:40px;height:40px;object-fit:cover;border-radius:8px;display:block;"
              onerror="
                this.style.display='none';
                this.nextElementSibling.style.display='flex';
                /* try SVG fallback */
                var svgImg = document.createElement('img');
                svgImg.src = '${logoSvgUrl}';
                svgImg.style = 'width:40px;height:40px;object-fit:cover;border-radius:8px;display:block;';
                svgImg.onerror = function(){ this.remove(); };
                this.parentNode.appendChild(svgImg);
              "
            />
            <div style="display:none;width:40px;height:40px;border-radius:8px;align-items:center;justify-content:center;font-weight:700;font-size:1rem;color:#fff;background:${color.stroke};">
              ${(item.name || '?').charAt(0).toUpperCase()}
            </div>
          </div>`;

        const langs = (item.languages || []).map(l =>
          `<span class="am-pill am-pill-lang">${langLabel(l)}</span>`).join('');
        const proposedBadge = item.__origin === 'proposed'
          ? `<span class="am-pill am-pill-proposed" data-fr>Proposé</span><span class="am-pill am-pill-proposed" data-en hidden>Proposed</span>`
          : '';

        return `<article class="am-card${item.__origin === 'proposed' ? ' am-card-proposed' : ''}"
          tabindex="0" data-name="${(item.name || '').replace(/"/g, '&quot;')}"
          role="button" aria-label="Voir les détails de ${(item.name || '').replace(/"/g, '&quot;')}">
          <div class="am-card-top">
            ${visualHTML}
            <h3 class="am-card-title">
              <a href="${item.url || '#'}" target="_blank" rel="noopener noreferrer"
                onclick="event.stopPropagation()">${item.name || 'Sans nom'}</a>
            </h3>
          </div>
          <p class="am-card-desc">${item.description || '—'}</p>
          <div class="am-card-tags">
            <span class="am-pill am-pill-type">${item.type || '?'}</span>
            <span class="am-pill am-pill-country">${item.country || '?'}</span>
            ${langs}
            ${proposedBadge}
          </div>
        </article>`;
      }

      // ── LIST VIEW (with logo square) ──
      function renderList(items) {
        const container = document.getElementById('am-list-view');
        document.getElementById('am-grid-view').style.display = 'none';
        document.getElementById('am-bubble-view').classList.remove('active');
        container.classList.toggle('active', currentView === 'list');
        if (currentView !== 'list') return;

        if (!items.length) { container.innerHTML = ''; return; }

        let html = '<ul class="am-list" style="list-style:none;margin:0;padding:0;">';
        items.forEach(item => {
          const logoUrl  = getLogoUrl(item);
          const logoSvgUrl = getLogoSvgUrl(item);
          const slug     = nameToSlug(item.name);
          const color    = getCountryColor(item.country);
          const initial  = (item.name || '?').charAt(0).toUpperCase();
          const langs    = (item.languages || []).map(l =>
            `<span class="am-pill am-pill-lang">${langLabel(l)}</span>`).join('');
          const proposed = item.__origin === 'proposed'
            ? `<span class="am-pill am-pill-proposed" data-fr>Proposé</span><span class="am-pill am-pill-proposed" data-en hidden>Proposed</span>`
            : '';

          html += `
          <li class="am-list-item${item.__origin === 'proposed' ? ' am-card-proposed' : ''}"
              tabindex="0" role="button"
              data-name="${(item.name || '').replace(/"/g, '&quot;')}"
              aria-label="Voir les détails de ${(item.name || '').replace(/"/g, '&quot;')}"
              style="display:flex;align-items:center;gap:0.85rem;padding:0.65rem 0.75rem;border-radius:12px;cursor:pointer;transition:background 0.15s ease;">

            <!-- LOGO SQUARE -->
            <div style="position:relative;width:48px;height:48px;min-width:48px;border-radius:10px;overflow:hidden;border:1px solid var(--am-border-subtle);">
              <img
                src="${logoUrl}"
                alt="${(item.name || '').replace(/"/g, '&quot;')} logo"
                class="am-list-logo"
                onerror="
                  this.style.display='none';
                  this.nextElementSibling.style.display='flex';
                  var svgImg = document.createElement('img');
                  svgImg.src = '${logoSvgUrl}';
                  svgImg.className = 'am-list-logo';
                  svgImg.onerror = function(){ this.remove(); };
                  this.parentNode.appendChild(svgImg);
                "
              />
              <div class="am-list-logo-fallback"
                   style="display:none;background:${color.stroke};">
                ${initial}
              </div>
            </div>

            <!-- CONTENT -->
            <div style="flex:1;min-width:0;">
              <div style="display:flex;align-items:baseline;gap:0.5rem;flex-wrap:wrap;">
                <a href="${item.url || '#'}" target="_blank" rel="noopener noreferrer"
                   style="font-weight:600;font-size:0.95rem;color:var(--am-accent);text-decoration:none;"
                   onclick="event.stopPropagation()">${item.name || 'Sans nom'}</a>
                <span class="am-pill am-pill-type" style="font-size:0.72rem;">${item.type || '?'}</span>
                <span class="am-pill am-pill-country" style="font-size:0.72rem;">${item.country || '?'}</span>
                ${langs}
                ${proposed}
              </div>
              <p style="margin:0.2rem 0 0;font-size:0.82rem;color:var(--am-text-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${item.description || '—'}</p>
            </div>
          </li>`;
        });
        html += '</ul>';

        container.innerHTML = html;
        container.querySelectorAll('.am-list-item').forEach(row => {
          row.addEventListener('click', () => openDetail(row.dataset.name));
          row.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openDetail(row.dataset.name); });
          row.addEventListener('mouseenter', () => { row.style.background = 'var(--am-surface)'; });
          row.addEventListener('mouseleave', () => { row.style.background = ''; });
        });
      }

      // ── BUBBLE VIEW (D3 — with logos as SVG <image>) ──
      function renderBubbles(items) {
        const wrap = document.getElementById('am-bubble-view');
        document.getElementById('am-grid-view').style.display = 'none';
        document.getElementById('am-list-view').classList.remove('active');
        wrap.classList.toggle('active', currentView === 'bubble');
        if (currentView !== 'bubble') return;

        // Clear previous SVG & legend
        wrap.querySelectorAll('svg, .am-bubble-legend').forEach(el => el.remove());

        const width  = wrap.clientWidth || 800;
        const height = 460;

        const svg = d3.select(wrap)
          .append('svg')
          .attr('width', width)
          .attr('height', height)
          .attr('role', 'img')
          .attr('aria-label', 'Visualisation en bulles des automédias regroupés par pays');

        // Define a clipPath per node so logos are clipped to circles
        const defs = svg.append('defs');

        // Pack layout
        const root = d3.hierarchy({ children: items }).sum(() => 1);
        d3.pack().size([width - 40, height - 40]).padding(14)(root);

        const tooltip     = document.getElementById('bubble-tooltip');
        const tooltipName = tooltip.querySelector('.am-bubble-tooltip-name');
        const tooltipType = tooltip.querySelector('.am-bubble-tooltip-type');
        const tooltipDesc = tooltip.querySelector('.am-bubble-tooltip-desc');

        const nodes = svg.append('g')
          .attr('transform', 'translate(20, 20)')
          .selectAll('g')
          .data(root.leaves())
          .join('g')
          .attr('transform', d => `translate(${d.x},${d.y})`)
          .style('cursor', 'pointer');

        // Create a circular clipPath for each bubble
        root.leaves().forEach((d, i) => {
          defs.append('clipPath')
            .attr('id', `bubble-clip-${i}`)
            .append('circle')
            .attr('r', d.r)
            .attr('cx', 0)
            .attr('cy', 0);
        });

        // Base circle (fill + stroke)
        nodes.append('circle')
          .attr('r', d => d.r)
          .attr('fill', d => getCountryColor(d.data.country).fill)
          .attr('stroke', d => getCountryColor(d.data.country).stroke)
          .attr('stroke-width', 1.5);

        // Logo image inside bubble — clipped to circle
        // Rendered as <image> SVG element; onerror falls back to text label
        nodes.each(function(d, i) {
          const g        = d3.select(this);
          const slug     = nameToSlug(d.data.name);
          const logoUrl  = getLogoUrl(d.data);
          const logoSvgUrl = getLogoSvgUrl(d.data);
          const r        = d.r;
          const imgSize  = r * 2 * 0.72; // logo takes 72% of diameter
          const offset   = -imgSize / 2;

          // <image> element — SVG-native, supports PNG/SVG
          const img = g.append('image')
            .attr('href', logoUrl)
            .attr('x', offset)
            .attr('y', offset)
            .attr('width', imgSize)
            .attr('height', imgSize)
            .attr('clip-path', `url(#bubble-clip-${i})`)
            .attr('preserveAspectRatio', 'xMidYMid meet')
            .style('border-radius', r + 'px'); // no-op in SVG but harmless

          // SVG <image> onerror: try .svg, then fallback to text label
          const imageEl = img.node();
          imageEl.addEventListener('error', function() {
            // Remove failed image
            this.remove();
            // Try SVG variant
            if (!this.dataset.triedSvg) {
              const svgImg = document.createElementNS('http://www.w3.org/2000/svg', 'image');
              svgImg.setAttribute('href', logoSvgUrl);
              svgImg.setAttribute('x', offset);
              svgImg.setAttribute('y', offset);
              svgImg.setAttribute('width', imgSize);
              svgImg.setAttribute('height', imgSize);
              svgImg.setAttribute('clip-path', `url(#bubble-clip-${i})`);
              svgImg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
              svgImg.dataset.triedSvg = '1';
              svgImg.addEventListener('error', function() {
                this.remove();
                // Final fallback: abbreviated text label
                const textEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                textEl.setAttribute('text-anchor', 'middle');
                textEl.setAttribute('dominant-baseline', 'central');
                textEl.setAttribute('font-size', Math.max(8, r * 0.32) + 'px');
                textEl.setAttribute('font-weight', '600');
                textEl.setAttribute('fill', '#333');
                textEl.setAttribute('pointer-events', 'none');
                const short = shortName(d.data.name, Math.floor(r / 5));
                textEl.textContent = short || (d.data.name || '').charAt(0).toUpperCase();
                d3.select(this.parentNode).node().appendChild(textEl);
              });
              d3.select(this.parentNode).node().appendChild(svgImg);
            }
          });
        });

        // Tooltip interactions
        nodes
          .on('mousemove', function(event, d) {
            tooltipName.textContent = d.data.name || '';
            tooltipType.textContent = d.data.type || '';
            tooltipDesc.textContent = (d.data.description || '').slice(0, 80) + (d.data.description?.length > 80 ? '…' : '');
            tooltip.style.display   = '';
            tooltip.style.opacity   = '1';
            const rect = wrap.getBoundingClientRect();
            let tx = event.clientX - rect.left + 14;
            let ty = event.clientY - rect.top  - 10;
            if (tx + 200 > width) tx -= 220;
            tooltip.style.left = tx + 'px';
            tooltip.style.top  = ty + 'px';
          })
          .on('mouseleave', function() {
            tooltip.style.opacity = '0';
            setTimeout(() => { tooltip.style.display = 'none'; }, 150);
          })
          .on('click', function(event, d) {
            openDetail(d.data.name);
          });

        // Legend
        const seen = {};
        const legend = document.createElement('div');
        legend.className = 'am-bubble-legend';
        items.forEach(item => {
          if (item.country && !seen[item.country]) {
            seen[item.country] = true;
            const c = getCountryColor(item.country);
            const dot = document.createElement('span');
            dot.className = 'am-bubble-legend-dot';
            dot.style.cssText = `
              display:inline-flex;align-items:center;gap:4px;
              font-size:0.75rem;color:var(--am-text-soft);margin-right:0.6rem;
            `;
            dot.innerHTML = `<span style="width:10px;height:10px;border-radius:50%;
              background:${c.fill};border:1.5px solid ${c.stroke};display:inline-block;"></span>${item.country}`;
            legend.appendChild(dot);
          }
        });
        wrap.appendChild(legend);
      }

      // ── DETAIL OVERLAY ──
      function openDetail(name) {
        const item = allData.find(d => d.name === name);
        if (!item) return;

        document.getElementById('detail-name').textContent = item.name || '';
        document.getElementById('detail-desc').textContent = item.description || '';
        document.getElementById('detail-link').href = item.url || '#';

        const meta  = document.getElementById('detail-meta');
        const langs = (item.languages || []).map(l =>
          `<span class="am-pill am-pill-lang">${langLabel(l)}</span>`).join('');

        meta.innerHTML = `
          <div class="am-detail-meta-row">
            <span class="am-detail-meta-label">Type</span>
            <span class="am-pill am-pill-type">${item.type || '?'}</span>
          </div>
          <div class="am-detail-meta-row">
            <span class="am-detail-meta-label">Pays</span>
            <span class="am-pill am-pill-country">${item.country || '?'}</span>
          </div>
          ${langs ? `<div class="am-detail-meta-row">
            <span class="am-detail-meta-label">Langue</span>
            ${langs}
          </div>` : ''}
          <div class="am-detail-meta-row">
            <span class="am-detail-meta-label">Statut</span>
            <span class="am-pill" style="background:rgba(80,160,80,0.1);color:#2d6a2d;border:1px solid rgba(80,160,80,0.3)">${item.status || '?'}</span>
          </div>
        `;

        document.getElementById('detail-overlay').classList.add('open');
        document.getElementById('detail-close').focus();
      }

      function closeDetail() {
        document.getElementById('detail-overlay').classList.remove('open');
      }

      document.getElementById('detail-close').addEventListener('click', closeDetail);
      document.getElementById('detail-overlay').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeDetail();
      });
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

      // ── VIEW TOGGLE BUTTONS ──
      document.querySelectorAll('.am-view-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentView = btn.dataset.view;
          document.querySelectorAll('.am-view-btn').forEach(b => {
            b.classList.remove('active');
            b.setAttribute('aria-selected', 'false');
          });
          btn.classList.add('active');
          btn.setAttribute('aria-selected', 'true');
          render();
        });
      });

      // ── SEARCH & FILTERS ──
      const searchInput = document.getElementById('am-search');
      if (searchInput) {
        searchInput.addEventListener('input', () => { searchQuery = searchInput.value; render(); });
      }
      ['am-filter-type', 'am-filter-country', 'am-filter-origin'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('change', render);
      });

      // ── DATA HOOKUP ──
      function hookData() {
        if (typeof allMedias !== 'undefined' && allMedias.length > 0) {
          allData = allMedias;
          buildLangFilters();
          render();
          return true;
        }
        return false;
      }

      function waitForData() {
        if (hookData()) return;
        const observer = new MutationObserver(() => {
          if (hookData()) observer.disconnect();
        });
        observer.observe(document.getElementById('am-grid-view') || document.body, { childList: true, subtree: true });

        let attempts = 0;
        const poll = setInterval(() => {
          attempts++;
          if (hookData() || attempts > 60) clearInterval(poll);
        }, 250);
      }

      const refreshBtn = document.getElementById('am-refresh-db');
      if (refreshBtn) {
        refreshBtn.addEventListener('click', () => { setTimeout(waitForData, 500); });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', waitForData);
      } else {
        waitForData();
      }

      // Hide the default am-results grid (from automediatheque.js)
      const style = document.createElement('style');
      style.textContent = '#am-results { display: none !important; }';
      document.head.appendChild(style);

    })();
    </script>

    <script>
    // === CURSEUR PERSONNALISÉ ===
    const cursor = document.getElementById('custom-cursor');
    if (cursor) {
      document.documentElement.classList.add('am-custom-cursor');
      document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top  = e.clientY + 'px';
        cursor.classList.remove('hidden');
      });
      document.addEventListener('mouseleave', () => cursor.classList.add('hidden'));
      document.addEventListener('mouseenter', () => cursor.classList.remove('hidden'));
      const isRedElement = (el) => {
        if (!el) return false;
        return el.classList.contains('am-card-title') || el.closest('.am-card-title') ||
               el.classList.contains('am-pill-link')  || el.closest('.am-pill-link');
      };
      const isClickable = (el) => {
        if (!el) return false;
        const tags = ['A','BUTTON','INPUT','TEXTAREA','SELECT','LABEL'];
        if (tags.includes(el.tagName)) return true;
        if (el.classList.contains('am-card') || el.classList.contains('am-pill') ||
            el.classList.contains('am-button') || el.getAttribute('role') === 'button') return true;
        return false;
      };
      document.addEventListener('mouseover', (e) => {
        cursor.classList.remove('hovering', 'hovering-link');
        if (isRedElement(e.target)) { cursor.classList.add('hovering-link'); }
        else {
          let target = e.target;
          while (target && target !== document.body) {
            if (isClickable(target)) { cursor.classList.add('hovering'); return; }
            target = target.parentElement;
          }
        }
      });
      document.addEventListener('mouseout', () => cursor.classList.remove('hovering', 'hovering-link'));
    }
    </script>

    <script>
    // === LANGUAGE TOGGLE ===
    const langToggle = document.getElementById('lang-toggle');
    let currentLang = localStorage.getItem('am-lang') || 'fr';
    function applyLang(lang) {
      currentLang = lang;
      localStorage.setItem('am-lang', lang);
      langToggle.textContent = lang === 'fr' ? 'EN' : 'FR';
      document.querySelectorAll('[data-fr]').forEach(el => { el.hidden = lang !== 'fr'; });
      document.querySelectorAll('[data-en]').forEach(el => { el.hidden = lang !== 'en'; });
      document.querySelectorAll('[data-fr-text]').forEach(el => {
        el.textContent = lang === 'fr' ? el.getAttribute('data-fr-text') : el.getAttribute('data-en-text');
      });
    }
    langToggle.addEventListener('click', () => applyLang(currentLang === 'fr' ? 'en' : 'fr'));
    applyLang(currentLang);
    </script>

    <script>
    // === MENU TOGGLE ===
    const menuToggle   = document.getElementById('menu-toggle');
    const menuDropdown = document.getElementById('menu-dropdown');
    menuToggle.addEventListener('click', () => {
      const isOpen = menuDropdown.classList.toggle('open');
      menuToggle.classList.toggle('active');
      menuToggle.setAttribute('aria-expanded', isOpen);
    });
    document.addEventListener('click', (e) => {
      if (!menuToggle.contains(e.target) && !menuDropdown.contains(e.target)) {
        menuDropdown.classList.remove('open');
        menuToggle.classList.remove('active');
        menuToggle.setAttribute('aria-expanded', 'false');
      }
    });
    </script>
  </body>
</html>
